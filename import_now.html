function log(msg,cls="ok"){
  const el=document.getElementById("log");
  el.style.display="block";
  el.innerHTML+=`<span class="${cls}">${msg}\n</span>`;
  el.scrollTop=el.scrollHeight;
}

async function run(){
  document.getElementById("btn").disabled=true;
  document.getElementById("btn").textContent="Bezig…";
  log("Bestaande boeken verwijderen…","info");
  const {error:de}=await db.from("books").delete().neq("id",0);
  if(de){log("Fout: "+de.message,"err");document.getElementById("btn").disabled=false;return;}
  log("✓ Database leeggemaakt","ok");
  log(BOOKS.length+" boeken laden…","info");
  let done=0;
  for(let i=0;i<BOOKS.length;i+=50){
    const {error}=await db.from("books").insert(BOOKS.slice(i,i+50));
    if(error){log("Fout: "+error.message,"err");document.getElementById("btn").disabled=false;return;}
    done+=Math.min(50,BOOKS.length-i);
    log("✓ "+done+" / "+BOOKS.length+" geladen");
  }
  log("\n🎉 Klaar! Alle boeken zijn hersteld.","ok");
  document.getElementById("btn").textContent="✓ Klaar!";
}
